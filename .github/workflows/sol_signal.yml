name: SOL Signal Analyzer

on:
  schedule:
    - cron: "0 7,13,17,21 * * *"   # 07h, 13h, 17h, 21h UTC

  workflow_dispatch:
    inputs:
      force:
        description: "Forcer l'envoi Telegram meme si signal inchange"
        required: false
        default: "false"
        type: boolean

env:
  # Force Node.js 24 pour les actions — supprime les warnings de deprecation
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore signal state cache
        uses: actions/cache@v4.2.3
        with:
          path: .sol_signal_state.json
          key: sol-signal-state-${{ github.ref_name }}
          restore-keys: sol-signal-state-

      - name: Test API access
        run: |
          curl -s "https://api.gateio.ws/api/v4/futures/usdt/tickers?contract=SOL_USDT" | head -c 200
          echo ""
          curl -s "https://api.binance.com/api/v3/ping" | head -c 100
          echo ""
          curl -o /dev/null -s -w "Bybit: %{http_code}\n" "https://api.bybit.com/v5/market/tickers?category=linear&symbol=SOLUSDT"
          curl -o /dev/null -s -w "Gate.io: %{http_code}\n" "https://api.gateio.ws/api/v4/futures/usdt/tickers?contract=SOL_USDT"

      - name: Run analyzer
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: |
          python sol_analyzer.py --notify
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python sol_analyzer.py --notify --force
          fi

      - name: Save signal state cache
        if: always()
        uses: actions/cache@v4.2.3
        with:
          path: .sol_signal_state.json
          key: sol-signal-state-${{ github.ref_name }}-${{ github.run_id }}
