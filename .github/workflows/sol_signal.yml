name: SOL Signal Analyzer

on:
  schedule:
    - cron: "0 7,13,17,21 * * *"   # 07h, 13h, 17h, 21h UTC

  workflow_dispatch:
    inputs:
      force:
        description: "Forcer l'envoi Telegram meme si signal inchange"
        required: false
        default: "false"
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Permission d'écrire dans le repo pour persister le state file
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          # Récupère le dernier commit incluant le state file
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analyzer
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python sol_analyzer.py --notify --force
          else
            python sol_analyzer.py --notify
          fi

      # Commit le state file dans le repo — garanti persistant entre tous les runs
      - name: Persist signal state
        if: always()
        run: |
          git config user.name  "sol-bot"
          git config user.email "sol-bot@github-actions"
          git add -f .sol_signal_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update signal state [skip ci]"
          git push 2>/dev/null || true
